name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: build
    # Trusted Publisher (OIDC) — npm へトークン無しで認証する
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # publish ジョブは Node 24 を使う:
      # - Node 24 は npm 11+ 同梱なので Trusted Publisher のためのアップデート不要
      # - Node 22 同梱 npm 10 は `npm install -g npm@latest` で promise-retry not found
      #   になることがあり、ロバストな代替が無い
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Show node/npm versions
        run: node --version && npm --version

      - run: npm ci
      - run: npm run build

      # tag (vX.Y.Z) と package.json version の整合性検証 + dist-tag 判定
      - name: Verify version and resolve dist-tag
        id: meta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          # prerelease 判定 (semver の "-" 以降があれば prerelease)
          # alpha/beta/rc など全て "next" タグで publish し、latest を汚さない方針。
          # npm はバージョン文字列に "-" を含むと latest 公開時に明示的 --tag を要求するため、
          # ここで自動的に --tag を解決する。
          if [[ "$PACKAGE_VERSION" =~ - ]]; then
            echo "dist_tag=next" >> $GITHUB_OUTPUT
            echo "Resolved dist-tag: next (prerelease)"
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
            echo "Resolved dist-tag: latest (stable)"
          fi

      # OIDC + provenance 付き publish
      # NOTE: `npx publish` は別物の古いパッケージ（publish@0.6.0）を起動して
      #       しまうので必ず `npm publish` を使うこと。
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag ${{ steps.meta.outputs.dist_tag }}

      # stable リリース時、next タグを latest と同じバージョンに揃える。
      #
      # Why: alpha/beta が走っていない期間も `npm i @scope/pkg@next` を使うユーザーが
      #      古いバージョンに固定されてしまうのを防ぐ。慣習的に next >= latest を保ちたい。
      #
      # 過去の事故: houki-nta-mcp v0.4.0 / v0.6.0 / v0.7.0 でこの揃え忘れを 3 回繰り返している
      # （手動 `npm dist-tag add` は OIDC 環境ではローカルに token が無く E401 になるため、
      #  release 直後に shuji さんが `npm login` してからコマンドを叩く運用になりがち）。
      #
      # CI 内なら publish 直後の OIDC セッションをそのまま流用できるので E401 を回避できる。
      # prerelease (next タグでの publish) ではこの step はスキップする（既に next が新しい
      # alpha を指しているため）。
      - name: Sync next dist-tag to stable version
        if: steps.meta.outputs.dist_tag == 'latest'
        run: |
          echo "Aligning next dist-tag -> ${{ steps.meta.outputs.version }}"
          npm dist-tag add @shuji-bonji/houki-nta-mcp@${{ steps.meta.outputs.version }} next
          npm dist-tag ls @shuji-bonji/houki-nta-mcp
