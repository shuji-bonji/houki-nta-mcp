name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: build
    # Trusted Publisher (OIDC) — npm へトークン無しで認証する
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # publish ジョブは Node 24 を使う:
      # - Node 24 は npm 11+ 同梱なので Trusted Publisher のためのアップデート不要
      # - Node 22 同梱 npm 10 は `npm install -g npm@latest` で promise-retry not found
      #   になることがあり、ロバストな代替が無い
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Show node/npm versions
        run: node --version && npm --version

      - run: npm ci
      - run: npm run build

      # tag (vX.Y.Z) と package.json version の整合性検証
      - name: Verify version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"

      # OIDC + provenance 付き publish
      # NOTE: `npx publish` は別物の古いパッケージ（publish@0.6.0）を起動して
      #       しまうので必ず `npm publish` を使うこと。
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
